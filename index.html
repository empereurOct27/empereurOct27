<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octave Informatique - Recharge Express</title>
  <style>
    body { 
      margin:0; 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #0f2027, #203a43); 
      color:white; 
    }
    .container { 
      max-width: 420px; 
      margin: 20px auto; 
      background: rgba(255,255,255,0.05); 
      border-radius: 20px; 
      overflow:hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
    }
    header { 
      background: white; 
      padding: 30px 15px; 
      text-align:center; 
    }
    .text-logo {
      font-size: 28px;
      font-weight: 900;
      color: #001f3f;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .text-logo span { color: #00d2ff; font-size: 32px; }
    .content { padding:25px; }
    
    select, input { 
      width:100%; 
      padding:15px; 
      margin:12px 0; 
      border-radius:12px; 
      border:none; 
      font-size:16px; 
    }

    .operators { 
      display:flex; 
      justify-content:space-around; 
      margin:30px 0; 
    }
    .op { 
      width:105px; 
      height:105px; 
      padding:10px; 
      border-radius:20px; 
      background:rgba(255,255,255,0.1); 
      transition: all 0.3s ease; 
      cursor:pointer; 
    }
    .op img { width:100%; height:100%; object-fit:contain; }
    .op.selected { 
      background:#00d2ff; 
      transform:scale(1.15); 
      box-shadow: 0 0 25px #00d2ff; 
    }

    .price { 
      text-align:center; 
      font-size:32px; 
      font-weight:bold; 
      margin:25px 0; 
      color:#00d2ff; 
      opacity:0; 
      transition: opacity 0.4s ease; 
    }
    .price.visible { 
      opacity:1; 
    }

    button { 
      width:100%; 
      padding:18px; 
      margin:15px 0; 
      border:none; 
      border-radius:12px; 
      font-size:18px; 
      font-weight:bold; 
      color:white; 
      cursor:pointer; 
      transition: all 0.2s ease;
    }
    button:active {
      transform: scale(0.95);
    }
    .btn-wave { background:#00d2ff; }
    .btn-wa { background:#25d366; }
    .btn-sms { background:#128c7e; }
    .btn-physique { background:#28a745; }

    footer { 
      text-align:center; 
      padding:20px; 
      background:#000; 
      font-size:14px; 
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="text-logo">
        Octave<span>Informatique</span><br>
        <small style="font-size:16px; color:#333;">Recharge Express</small>
      </div>
    </header>

    <div class="content">
      <p style="text-align:center; font-size:18px;">Choisis ton opérateur</p>
      
      <div class="operators">
        <div class="op selected" onclick="selectOp('orange')">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg" alt="Orange">
        </div>
        <div class="op" onclick="selectOp('mtn')">
          <img src="https://upload.wikimedia.org/wikipedia/fr/e/e9/Mtn-logo-svg.svg" alt="MTN">
        </div>
        <div class="op" onclick="selectOp('moov')">
          <img src="https://upload.wikimedia.org/wikipedia/fr/1/1d/Moov_Africa_logo.png" alt="Moov Africa">
        </div>
      </div>

      <select id="service">
        <option value="">Choisis le service</option>
      </select>

      <input type="tel" id="phone" placeholder="Numéro à recharger (ex: 0708091011)" maxlength="10">

      <input type="number" id="montant" placeholder="Montant (ex: 1000)" min="100">

      <div class="price" id="total">Montant : 0 FCFA</div>

      <button class="btn-wave" onclick="payerWave()">Payer via Wave</button>
      <button class="btn-wa" onclick="envoyerWhatsApp()">Envoyer par WhatsApp</button>
      <button class="btn-sms" onclick="envoyerSMS()">Envoyer par SMS</button>
      <button class="btn-physique" onclick="payerPhysique()">Payer en espèces</button>
    </div>

    <footer>
      Octave Informatique © 2025 • Abidjan • +225 0584921917
    </footer>
  </div>

  <script>
    let operateur = "ORANGE";

    const services = {
      orange: ["Crédit direct", "Forfait appels", "Forfait Internet"],
      moov: ["Crédit d'appels", "Forfait appels", "Forfait Internet", "Moov Folie Appels", "Moov Folie Internet"],
      mtn: ["Crédit d'appels", "Forfait Appels", "Forfait Internet", "Forfait MTN C'chic"]
    };

    function selectOp(op) {
      document.querySelectorAll('.op').forEach(e => e.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      operateur = op.toUpperCase();

      const select = document.getElementById('service');
      select.innerHTML = '<option value="">Choisis le service</option>';
      services[op].forEach(s => {
        let option = document.createElement('option');
        option.value = s;
        option.textContent = s;
        select.appendChild(option);
      });
    }

    // Animation du montant
    document.getElementById('montant').addEventListener('input', function() {
      let m = this.value || 0;
      const totalEl = document.getElementById('total');
      totalEl.textContent = "Montant : " + m + " FCFA";
      totalEl.classList.add('visible');
    });

    const monNumero = "2250584921917";

    function genererMessage() {
      let service = document.getElementById('service').value;
      let phone = document.getElementById('phone').value;
      let montant = document.getElementById('montant').value || "À convenir";

      return encodeURIComponent(
        "*NOUVELLE DEMANDE RECHARGE*\n\n" +
        "Octave Informatique\n" +
        "Opérateur : " + operateur + "\n" +
        "Numéro : " + phone + "\n" +
        "Service : " + service + "\n" +
        "Montant : " + montant + " FCFA\n\n" +
        "Merci !"
      );
    }

    function payerWave() {
      let montant = parseInt(document.getElementById('montant').value);
      if (!montant || montant < 100) {
        alert("Le montant minimum est de 100 FCFA");
        return;
      }
      window.open("https://pay.wave.com/m/M_ci_7CIg4jpqcsl7/" + montant + "/c/ci/", '_blank');
    }

    function envoyerWhatsApp() {
      let msg = genererMessage();
      window.open("https://wa.me/" + monNumero + "?text=" + msg);
    }

    function envoyerSMS() {
      let msg = genererMessage();
      window.open("sms:" + monNumero + "?body=" + msg);
    }

    function payerPhysique() {
      let msg = genererMessage();
      window.open("https://wa.me/" + monNumero + "?text=" + msg + "%0A%0A(Je passe payer en espèces)");
    }

    // Initialisation
    selectOp('orange');
  </script>
</body>
</html>
